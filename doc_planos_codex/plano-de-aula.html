<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário - Plano de Aula CENEB</title>
  <style>
    :root {
      --paper-width: 1122px;
      --paper-height: 794px;
      --ink: #050505;
      --paper: #ffffff;
      --app-bg: #d7d9dc;
      --focus: #e8f1ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0) 170px),
        var(--app-bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 28px 18px 40px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: min(100%, 1122px);
      margin: 0 auto 18px;
    }

    .page-title {
      margin: 0;
      color: #111;
      font-size: 20px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      border: 1px solid #111;
      border-radius: 6px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font: 700 14px/1 Arial, Helvetica, sans-serif;
      min-height: 42px;
      padding: 0 18px;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .button:hover {
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
      transform: translateY(-1px);
    }

    .button:active {
      box-shadow: none;
      transform: translateY(0);
    }

    .button.secondary {
      background: #fff;
      color: #111;
    }

    .status {
      min-height: 18px;
      width: min(100%, 1122px);
      margin: 0 auto 10px;
      color: #222;
      font-size: 13px;
      text-align: right;
    }

    .stage-shell {
      width: var(--paper-width);
      height: var(--paper-height);
      margin: 0 auto;
      position: relative;
    }

    #documentStage {
      width: var(--paper-width);
      height: var(--paper-height);
      transform-origin: top left;
    }

    .plan-document {
      width: var(--paper-width);
      height: var(--paper-height);
      background: var(--paper);
      border: 7px double var(--ink);
      box-shadow: 0 14px 34px rgba(0,0,0,.26);
      display: flex;
      flex-direction: column;
      padding: 9px;
      color: var(--ink);
      overflow: hidden;
    }

    .document-inner {
      border: 2px solid var(--ink);
      display: flex;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      padding: 0 7px 8px;
    }

    .top-area {
      height: 137px;
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 14px;
      padding: 0 20px 0 10px;
    }

    .logo-wrap {
      border-right: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: 5px;
    }

    .logo {
      display: block;
      width: 156px;
      height: auto;
    }

    .header-fields {
      display: grid;
      grid-template-rows: 1fr 1fr;
      min-width: 0;
      padding-top: 20px;
    }

    .field-row {
      display: grid;
      align-items: center;
      column-gap: 34px;
    }

    .field-row.top {
      column-gap: 30px;
      grid-template-columns: minmax(450px, 1fr) max-content max-content;
    }

    .field-row.bottom {
      grid-template-columns: 160px 180px 1fr;
      padding-left: 4px;
    }

    .field {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
    }

    .bimestre-field {
      gap: 1ch;
    }

    .field-label,
    .turno-label {
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
    }

    .field-input {
      width: 100%;
      min-width: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: 400 21px/1.1 Arial, Helvetica, sans-serif;
      height: 28px;
      outline: 0;
      padding: 1px 3px 0;
    }

    .field-input:focus {
      background: var(--focus);
      box-shadow: inset 0 -1px 0 var(--ink);
    }

    #componente {
      flex: 0 1 17ch;
      min-width: 17ch;
    }

    #educador {
      flex: 0 1 9ch;
      min-width: 9ch;
    }

    #bimestre {
      flex: 0 0 3ch;
      max-width: 3ch;
      min-width: 3ch;
      text-align: center;
    }

    .turno-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      white-space: nowrap;
    }

    .turn-option {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      user-select: none;
    }

    .turn-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .turn-mark::before {
      content: "(  )";
      display: inline-block;
      font-size: 22px;
      letter-spacing: 1px;
      min-width: 42px;
      text-align: center;
    }

    .turn-option input:checked + .turn-mark::before {
      content: "(X)";
      font-weight: 700;
      letter-spacing: 0;
    }

    .turn-option:has(input:focus-visible) .turn-mark {
      outline: 2px solid #7aa7ff;
      outline-offset: 3px;
    }

    .lesson-frame {
      border: 4px solid var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .lesson-title {
      align-items: center;
      border-bottom: 4px solid var(--ink);
      display: flex;
      height: 38px;
      justify-content: center;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      text-align: center;
    }

    .lesson-table {
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
    }

    .lesson-table th,
    .lesson-table td {
      border: 3px solid var(--ink);
    }

    .lesson-table thead th {
      height: 39px;
      padding: 3px 6px;
      text-align: center;
      vertical-align: middle;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.05;
    }

    .lesson-table thead th:first-child,
    .lesson-table tbody td:first-child {
      border-left: 0;
    }

    .lesson-table thead th:last-child,
    .lesson-table tbody td:last-child {
      border-right: 0;
    }

    .lesson-table thead tr:first-child th {
      border-top: 0;
    }

    .lesson-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .lesson-table tbody tr {
      height: 203px;
    }

    .lesson-table td {
      padding: 0;
      vertical-align: top;
    }

    .th-subtitle {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 2px;
    }

    .col-days { width: 15.3%; }
    .col-content { width: 15.3%; }
    .col-goals { width: 15.3%; }
    .col-procedures { width: 21.5%; }
    .col-resources { width: 12.9%; }
    .col-homework { width: 19.7%; }

    .cell-input {
      width: 100%;
      height: 100%;
      min-height: 202px;
      border: 0;
      display: block;
      resize: none;
      outline: 0;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      font: 400 13px/1.25 Arial, Helvetica, sans-serif;
      padding: 8px 9px;
    }

    .cell-input:focus {
      background: var(--focus);
    }

    .footer-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 70px;
      padding: 0 36px 32px 36px;
      min-height: 121px;
    }

    .signature {
      width: 430px;
      text-align: center;
    }

    .signature-line {
      border-top: 2px solid var(--ink);
      height: 15px;
      width: 100%;
    }

    .signature-label {
      font-size: 15px;
      letter-spacing: .5px;
      line-height: 1;
      text-transform: uppercase;
    }

    .export-clone {
      box-shadow: none !important;
      left: -10000px !important;
      position: fixed !important;
      top: 0 !important;
      transform: none !important;
      z-index: -1 !important;
    }

    .is-exporting .field-input:focus,
    .is-exporting .cell-input:focus {
      background: transparent;
      box-shadow: none;
    }

    @media (max-width: 760px) {
      .app {
        padding: 18px 10px 32px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        flex-direction: column;
        justify-content: stretch;
      }

      .button {
        flex: 1;
      }

      .status {
        text-align: left;
      }

      .stage-shell {
        margin-left: 0;
        margin-right: 0;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }

      html,
      body {
        width: 297mm;
        height: 210mm;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        overflow: hidden !important;
      }

      .toolbar,
      .status {
        display: none !important;
      }

      .app {
        padding: 0 !important;
        min-height: 0 !important;
      }

      .stage-shell,
      #documentStage {
        width: 297mm !important;
        height: 210mm !important;
        margin: 0 !important;
        transform: none !important;
      }

      .plan-document {
        width: 297mm !important;
        height: 210mm !important;
        box-shadow: none !important;
        page-break-after: avoid !important;
        page-break-before: avoid !important;
        page-break-inside: avoid !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toolbar" aria-label="Ações do formulário">
      <h1 class="page-title">Formulário - Plano de Aula</h1>
      <div class="actions">
        <button class="button" type="button" id="downloadPdf">Baixar PDF</button>
        <button class="button secondary" type="button" id="clearForm">Limpar formulário</button>
      </div>
    </div>

    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="stage-shell" id="stageShell">
      <div id="documentStage">
        <section class="plan-document" id="planDocument" aria-label="Plano de aula CENEB">
          <div class="document-inner">
            <header class="top-area">
              <div class="logo-wrap">
                <img class="logo" src="ceneb-logo.png" alt="CENEB">
              </div>

              <div class="header-fields">
                <div class="field-row top">
                  <label class="field">
                    <span class="field-label">Componente Curricular:</span>
                    <input class="field-input" id="componente" type="text" autocomplete="off">
                  </label>
                  <label class="field">
                    <span class="field-label">Educador(a):</span>
                    <input class="field-input" id="educador" type="text" autocomplete="off">
                  </label>
                  <label class="field bimestre-field">
                    <span class="field-label">Bimestre:</span>
                    <input class="field-input" id="bimestre" type="text" maxlength="3" autocomplete="off">
                  </label>
                </div>

                <div class="field-row bottom">
                  <label class="field">
                    <span class="field-label">Ano:</span>
                    <input class="field-input" id="ano" type="text" autocomplete="off">
                  </label>
                  <label class="field">
                    <span class="field-label">Turma:</span>
                    <input class="field-input" id="turma" type="text" autocomplete="off">
                  </label>
                  <div class="turno-group" role="radiogroup" aria-label="Turno">
                    <span class="turno-label">Turno:</span>
                    <label class="turn-option">
                      <input type="radio" name="turno" value="Matutino">
                      <span class="turn-mark" aria-hidden="true"></span>
                      <span>Matutino</span>
                    </label>
                    <label class="turn-option">
                      <input type="radio" name="turno" value="Vespertino">
                      <span class="turn-mark" aria-hidden="true"></span>
                      <span>Vespertino</span>
                    </label>
                  </div>
                </div>
              </div>
            </header>

            <section class="lesson-frame" aria-label="Tabela do plano de aula">
              <div class="lesson-title">PLANO DE AULA</div>
              <table class="lesson-table">
                <colgroup>
                  <col class="col-days">
                  <col class="col-content">
                  <col class="col-goals">
                  <col class="col-procedures">
                  <col class="col-resources">
                  <col class="col-homework">
                </colgroup>
                <thead>
                  <tr>
                    <th>Dias</th>
                    <th>Conteúdo</th>
                    <th>Objetivos</th>
                    <th>Procedimentos <span class="th-subtitle">(Discriminar atividades e trabalhos)</span></th>
                    <th>Recursos</th>
                    <th>Atividades Para Casa</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><textarea class="cell-input" aria-label="Dias 1"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Conteúdo 1"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Objetivos 1"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Procedimentos 1"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Recursos 1"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Atividades para casa 1"></textarea></td>
                  </tr>
                  <tr>
                    <td><textarea class="cell-input" aria-label="Dias 2"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Conteúdo 2"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Objetivos 2"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Procedimentos 2"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Recursos 2"></textarea></td>
                    <td><textarea class="cell-input" aria-label="Atividades para casa 2"></textarea></td>
                  </tr>
                </tbody>
              </table>
            </section>

            <footer class="footer-area">
              <div class="signature">
                <div class="signature-line"></div>
                <div class="signature-label">Diretora Pedagógica</div>
              </div>
              <div class="signature">
                <div class="signature-line"></div>
                <div class="signature-label">Coordenadora Pedagógica</div>
              </div>
            </footer>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const paper = {
      width: 1122,
      height: 794
    };

    const stageShell = document.getElementById('stageShell');
    const stage = document.getElementById('documentStage');
    const documentEl = document.getElementById('planDocument');
    const statusEl = document.getElementById('status');
    const appEl = document.querySelector('.app');
    const maxCellLines = 10;
    const lastValidCellValues = new WeakMap();

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function lineCount(value) {
      if (value === '') return 1;
      return value.replace(/\r\n?/g, '\n').split('\n').length;
    }

    function selectedLineCount(field) {
      return lineCount(field.value.slice(field.selectionStart, field.selectionEnd));
    }

    function rememberCellValue(field) {
      lastValidCellValues.set(field, {
        value: field.value,
        start: field.selectionStart,
        end: field.selectionEnd
      });
    }

    function restoreCellValue(field) {
      const lastValid = lastValidCellValues.get(field) || { value: '', start: 0, end: 0 };
      field.value = lastValid.value;
      field.selectionStart = Math.min(lastValid.start, field.value.length);
      field.selectionEnd = Math.min(lastValid.end, field.value.length);
      setStatus(`Cada célula permite no máximo ${maxCellLines} linhas.`);
    }

    function isCellTextarea(target) {
      return target && target.classList && target.classList.contains('cell-input');
    }

    function wouldExceedCellLimit(field, insertedText) {
      const before = field.value.slice(0, field.selectionStart);
      const after = field.value.slice(field.selectionEnd);
      return lineCount(before + insertedText + after) > maxCellLines;
    }

    function validateCellLimit(field) {
      if (lineCount(field.value) > maxCellLines || field.scrollHeight > field.clientHeight + 1) {
        restoreCellValue(field);
        return false;
      }

      rememberCellValue(field);
      return true;
    }

    function scalePreview() {
      const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      const appWidth = appEl ? appEl.getBoundingClientRect().width : viewportWidth;
      let availableWidth = Math.max(280, Math.min(viewportWidth, appWidth) - 20);
      if (viewportWidth <= 760) {
        availableWidth = Math.max(280, Math.min(availableWidth, viewportWidth - 60));
      }
      const scale = Math.min(1, availableWidth / paper.width);
      stage.style.transform = `scale(${scale})`;
      stageShell.style.width = `${paper.width * scale}px`;
      stageShell.style.height = `${paper.height * scale}px`;
    }

    function syncCloneValues(source, clone) {
      const sourceFields = source.querySelectorAll('input, textarea');
      const cloneFields = clone.querySelectorAll('input, textarea');

      sourceFields.forEach((field, index) => {
        const target = cloneFields[index];
        if (!target) return;

        if (field.type === 'radio' || field.type === 'checkbox') {
          target.checked = field.checked;
        } else {
          target.value = field.value;
          target.setAttribute('value', field.value);
        }

        if (field.tagName === 'TEXTAREA') {
          target.textContent = field.value;
        }
      });
    }

    function waitForImages(scope) {
      const images = Array.from(scope.querySelectorAll('img'));
      return Promise.all(images.map((img) => {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise((resolve) => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      }));
    }

    function makeExportClone() {
      const clone = documentEl.cloneNode(true);
      clone.id = 'planDocumentExport';
      clone.classList.add('export-clone');
      syncCloneValues(documentEl, clone);
      document.body.appendChild(clone);
      return clone;
    }

    async function downloadPdf() {
      const html2canvasReady = typeof window.html2canvas === 'function';
      const jsPdfReady = Boolean(window.jspdf && window.jspdf.jsPDF);

      if (!html2canvasReady || !jsPdfReady) {
        window.print();
        return;
      }

      setStatus('Gerando PDF...');
      document.body.classList.add('is-exporting');
      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }

      let clone;
      try {
        clone = makeExportClone();
        await waitForImages(clone);
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        const canvas = await window.html2canvas(clone, {
          backgroundColor: '#ffffff',
          logging: false,
          scale: 2.5,
          useCORS: true,
          width: paper.width,
          height: paper.height,
          windowWidth: paper.width,
          windowHeight: paper.height
        });

        const imageData = canvas.toDataURL('image/png');
        const pdf = new window.jspdf.jsPDF({
          orientation: 'landscape',
          unit: 'mm',
          format: 'a4'
        });

        pdf.addImage(imageData, 'PNG', 0, 0, 297, 210, undefined, 'FAST');
        pdf.save('plano-de-aula-ceneb.pdf');
        setStatus('PDF pronto.');
      } catch (error) {
        console.error(error);
        setStatus('Não foi possível gerar automaticamente. Abrindo impressão do navegador...');
        window.print();
      } finally {
        if (clone) clone.remove();
        document.body.classList.remove('is-exporting');
        window.setTimeout(() => setStatus(''), 2800);
      }
    }

    function clearForm() {
      const hasContent = Array.from(documentEl.querySelectorAll('input[type="text"], textarea'))
        .some((field) => field.value.trim() !== '') ||
        Array.from(documentEl.querySelectorAll('input[type="radio"]')).some((field) => field.checked);

      if (hasContent && !window.confirm('Deseja limpar todos os dados do formulário?')) return;

      documentEl.querySelectorAll('input[type="text"], textarea').forEach((field) => {
        field.value = '';
      });
      documentEl.querySelectorAll('input[type="radio"]').forEach((field) => {
        field.checked = false;
      });
      documentEl.querySelectorAll('.cell-input').forEach(rememberCellValue);
      setStatus('Formulário limpo.');
      window.setTimeout(() => setStatus(''), 1800);
    }

    document.getElementById('downloadPdf').addEventListener('click', downloadPdf);
    document.getElementById('clearForm').addEventListener('click', clearForm);

    documentEl.querySelectorAll('.cell-input').forEach(rememberCellValue);

    documentEl.addEventListener('keydown', (event) => {
      if (!isCellTextarea(event.target) || event.key !== 'Enter') return;

      const selectedLines = selectedLineCount(event.target);
      const replacingText = event.target.selectionStart !== event.target.selectionEnd;
      const currentLines = lineCount(event.target.value);

      if (currentLines >= maxCellLines && !(replacingText && selectedLines > 1)) {
        event.preventDefault();
        setStatus(`Cada célula permite no máximo ${maxCellLines} linhas.`);
      }
    });

    documentEl.addEventListener('beforeinput', (event) => {
      if (!isCellTextarea(event.target)) return;

      const inputType = event.inputType || '';
      const insertedText = inputType === 'insertLineBreak' ? '\n' : event.data || '';

      if (insertedText && wouldExceedCellLimit(event.target, insertedText)) {
        event.preventDefault();
        setStatus(`Cada célula permite no máximo ${maxCellLines} linhas.`);
      }
    });

    documentEl.addEventListener('paste', (event) => {
      if (!isCellTextarea(event.target)) return;

      const pastedText = event.clipboardData ? event.clipboardData.getData('text') : '';
      if (wouldExceedCellLimit(event.target, pastedText)) {
        event.preventDefault();
        setStatus(`Cada célula permite no máximo ${maxCellLines} linhas.`);
      }
    });

    documentEl.addEventListener('drop', (event) => {
      if (isCellTextarea(event.target)) {
        event.preventDefault();
        setStatus(`Cada célula permite no máximo ${maxCellLines} linhas.`);
      }
    });

    documentEl.addEventListener('input', (event) => {
      if (isCellTextarea(event.target)) {
        validateCellLimit(event.target);
      }
    });

    documentEl.addEventListener('keyup', (event) => {
      if (isCellTextarea(event.target)) {
        rememberCellValue(event.target);
      }
    });

    window.addEventListener('resize', scalePreview);
    scalePreview();
  </script>
</body>
</html>
